<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChargeUZ</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:#0f1115;}
  #map{position:absolute;inset:0;}
  canvas{outline:none;}
  :root{ --accent:#4338ff; --accent2:#6d28d9; }
  svg{display:block;}
  .ic-svg{width:1em;height:1em;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;}

  /* ===== ВЕРХ ===== */
  .topbar{position:absolute;top:calc(12px + env(safe-area-inset-top));left:12px;right:12px;z-index:10;display:flex;gap:8px;align-items:center;pointer-events:none;}
  .pill{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.12);pointer-events:auto;cursor:pointer;transition:.15s;display:flex;align-items:center;}
  .pill:active{transform:scale(.95);}
  .wallet-pill{padding:11px 15px;gap:9px;}
  .wallet-pill .ic{font-size:18px;color:#111;display:flex;}
  .wallet-pill .bal{font-weight:800;font-size:15px;color:#111;white-space:nowrap;}
  .gift{width:46px;height:46px;justify-content:center;font-size:20px;color:#111;}
  .icon-btn{width:46px;height:46px;justify-content:center;font-size:19px;position:relative;color:#111;}
  .icon-btn .dot{position:absolute;top:6px;right:6px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;z-index:2;}
  .spacer{margin-left:auto;}

  /* ===== ФИЛЬТРЫ ===== */
  .filters{position:absolute;top:calc(70px + env(safe-area-inset-top));left:0;right:0;z-index:9;display:flex;gap:8px;overflow-x:auto;padding:0 12px;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .chip{flex:none;display:flex;align-items:center;gap:6px;background:#fff;border:none;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;color:#444;box-shadow:0 3px 14px rgba(0,0,0,.1);cursor:pointer;transition:.15s;white-space:nowrap;}
  .chip:active{transform:scale(.94);}
  .chip.active{background:var(--accent);color:#fff;}
  .chip img{width:18px;height:18px;border-radius:5px;object-fit:cover;}
  .chip .swatch{width:12px;height:12px;border-radius:50%;}

  /* ===== ПРАВЫЕ КНОПКИ ===== */
  .side-btns{position:absolute;right:12px;bottom:calc(100px + env(safe-area-inset-bottom));z-index:10;display:flex;flex-direction:column;gap:10px;}
  .round-btn{width:48px;height:48px;border-radius:50%;background:#fff;border:none;box-shadow:0 4px 18px rgba(0,0,0,.18);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;color:#111;}
  .round-btn:active{transform:scale(.9);}

  /* ===== НИЖНИЙ ТАББАР ===== */
  .tabbar{position:absolute;bottom:0;left:0;right:0;z-index:25;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.1);display:flex;justify-content:space-around;align-items:center;padding:10px 8px calc(10px + env(safe-area-inset-bottom));}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#9ca3af;font-size:10px;font-weight:600;transition:.15s;flex:1;}
  .tab .ti{font-size:21px;display:flex;}
  .tab.active{color:var(--accent);}
  .tab:active{transform:scale(.92);}
  .tab-center{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin-top:-26px;box-shadow:0 6px 20px rgba(67,56,255,.4);color:#fff;font-size:24px;flex:none;cursor:pointer;transition:.15s;}
  .tab-center:active{transform:scale(.9);}

  /* ===== ВЫЕЗЖАЮЩИЕ ПАНЕЛИ ===== */
  .sheet{position:absolute;bottom:0;left:0;right:0;z-index:30;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.2);transform:translateY(110%);transition:transform .38s cubic-bezier(.16,1,.3,1);max-height:85vh;display:flex;flex-direction:column;}
  .sheet.open{transform:translateY(0);}
  .sheet-body{overflow-y:auto;padding:0 18px calc(24px + env(safe-area-inset-bottom));}
  .grab{width:42px;height:5px;background:#e2e2e2;border-radius:3px;margin:12px auto 6px;flex:none;}
  .sheet-head{display:flex;align-items:center;gap:12px;padding:6px 18px 14px;flex:none;}
  .sheet-head h2{font-size:19px;}
  .back-btn{background:#f1f1f4;border:none;width:38px;height:38px;border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;flex:none;}
  .back-btn:active{transform:scale(.92);}

  /* станция */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
  .b-av{background:#dcfce7;color:#16a34a;}
  .b-busy{background:#fef3c7;color:#d97706;}
  .b-off{background:#f1f1f1;color:#888;}
  .badge .dotc{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .addr{color:#888;font-size:13px;margin-bottom:14px;}
  .specs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0;}
  .spec{background:#f7f8fa;border-radius:14px;padding:13px 8px;text-align:center;}
  .spec .v{font-size:16px;font-weight:800;color:#111;}
  .spec .k{font-size:10px;color:#999;margin-top:3px;}
  .conns{margin:14px 0;}
  .conn-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:#f7f8fa;border-radius:12px;margin-bottom:8px;}
  .conn-row .free{font-size:12px;font-weight:700;}
  .btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn:active{transform:scale(.98);}
  .btn:disabled{background:#ccc;}
  .btn-sec{background:#f1f1f4;color:#333;margin-top:9px;}
  .st-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .st-logo{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;flex:none;overflow:hidden;}
  .st-logo img{width:100%;height:100%;object-fit:cover;}

  /* список */
  .list-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid #f3f3f5;cursor:pointer;}
  .list-item:active{opacity:.6;}
  .li-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex:none;overflow:hidden;}
  .li-ic img{width:100%;height:100%;object-fit:cover;}
  .li-main{flex:1;min-width:0;}
  .li-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .li-sub{font-size:12px;color:#999;}
  .li-right{text-align:right;font-size:12px;font-weight:700;}

  /* меню-строки */
  .menu-row{display:flex;align-items:center;gap:14px;padding:15px 4px;border-bottom:1px solid #f3f3f5;cursor:pointer;font-size:15px;font-weight:600;}
  .menu-row:active{opacity:.6;}
  .menu-row .mi{width:40px;height:40px;border-radius:12px;background:#f1f1f4;display:flex;align-items:center;justify-content:center;font-size:18px;color:#444;}
  .menu-row .arr{margin-left:auto;color:#ccc;font-size:18px;display:flex;}

  /* переключатель */
  .switch{margin-left:auto;width:46px;height:26px;border-radius:13px;background:#16a34a;position:relative;transition:.2s;flex:none;}
  .switch:not(.on){background:#ccc;}
  .switch .knob{position:absolute;top:3px;left:23px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .switch:not(.on) .knob{left:3px;}

  /* карта оплаты */
  .pay-card{background:linear-gradient(135deg,#1e293b,#334155);border-radius:18px;padding:20px;color:#fff;margin-bottom:12px;}
  .pay-card.add{background:#f7f8fa;border:2px dashed #ddd;color:#999;text-align:center;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
  .pay-card .num{font-size:18px;letter-spacing:2px;margin:18px 0 14px;}
  .pay-card .row{display:flex;justify-content:space-between;font-size:12px;opacity:.8;}

  /* профиль */
  .prof-head{display:flex;align-items:center;gap:14px;padding:8px 0 18px;}
  .avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;}
  .prof-name{font-size:18px;font-weight:800;}
  .prof-phone{font-size:13px;color:#999;}

  /* кошелёк */
  .wallet-card{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:18px;padding:22px;color:#fff;margin-bottom:16px;}
  .wallet-card .lbl2{font-size:13px;opacity:.85;}
  .wallet-card .big{font-size:30px;font-weight:800;margin:4px 0 14px;}
  .topup{display:flex;gap:8px;margin-bottom:10px;}
  .topup button{flex:1;padding:13px 4px;border:2px solid #eee;background:#fff;border-radius:12px;font-weight:700;cursor:pointer;font-size:13px;}
  .topup button:active{border-color:var(--accent);color:var(--accent);}

  /* зарядка */
  .ring{width:150px;height:150px;border-radius:50%;margin:6px auto 18px;position:relative;background:conic-gradient(var(--accent) var(--p,0%), #eee 0);display:flex;align-items:center;justify-content:center;}
  .ring::before{content:'';position:absolute;inset:14px;background:#fff;border-radius:50%;}
  .ring .num2{position:relative;font-size:32px;font-weight:800;color:#111;}
  .charge-info{display:flex;justify-content:space-around;margin:16px 0;}
  .charge-info .v{font-size:20px;font-weight:800;}
  .charge-info .k{font-size:11px;color:#999;}

  /* search */
  .search-input{width:100%;padding:13px 16px;border:none;background:#f1f1f4;border-radius:14px;font-size:15px;margin-bottom:6px;}
  .search-input:focus{outline:2px solid var(--accent);}

  /* QR */
  .scan-corner{position:absolute;width:30px;height:30px;border:4px solid #fff;}
  .scan-corner.tl{top:14px;left:14px;border-right:none;border-bottom:none;border-radius:12px 0 0 0;}
  .scan-corner.tr{top:14px;right:14px;border-left:none;border-bottom:none;border-radius:0 12px 0 0;}
  .scan-corner.bl{bottom:14px;left:14px;border-right:none;border-top:none;border-radius:0 0 0 12px;}
  .scan-corner.br{bottom:14px;right:14px;border-left:none;border-top:none;border-radius:0 0 12px 0;}
  .scan-line{position:absolute;left:14px;right:14px;height:3px;background:linear-gradient(90deg,transparent,#4338ff,transparent);box-shadow:0 0 12px #4338ff;animation:scanMove 2.2s ease-in-out infinite;}
  @keyframes scanMove{0%{top:18px}50%{top:218px}100%{top:18px}}

  .toast{position:absolute;bottom:120px;left:50%;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:50;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .empty{color:#aaa;font-size:14px;padding:20px 0;text-align:center;}
  .empty svg{width:40px;height:40px;margin-bottom:10px;color:#ddd;}
</style>
</head>
<body>

<div id="map"></div>

<!-- ВЕРХ -->
<div class="topbar">
  <div class="pill wallet-pill" onclick="openSheet('wallet')">
    <span class="ic"><svg class="ic-svg" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="14" rx="3"/><path d="M2 10h20"/><circle cx="17" cy="14" r="1.4" fill="currentColor" stroke="none"/></svg></span>
    <span class="bal" id="balTop">85 975</span><span style="font-size:12px;color:#999">so'm</span>
  </div>
  <div class="pill gift" onclick="toast('Промокоды (демо)')"><svg class="ic-svg" viewBox="0 0 24 24" style="width:20px;height:20px"><rect x="3" y="9" width="18" height="12" rx="2"/><path d="M3 13h18M12 9v12M12 9c-2-4-6-4-6-1.5S9 9 12 9zM12 9c2-4 6-4 6-1.5S15 9 12 9z"/></svg></div>
  <div class="pill icon-btn spacer" onclick="openSheet('search')"><svg class="ic-svg" viewBox="0 0 24 24" style="width:19px;height:19px"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></div>
  <div class="pill icon-btn" onclick="openSheet('notif')"><svg class="ic-svg" viewBox="0 0 24 24" style="width:19px;height:19px"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="dot">12</span></div>
</div>

<!-- ФИЛЬТРЫ -->
<div class="filters" id="filters"></div>

<!-- ПРАВЫЕ КНОПКИ -->
<div class="side-btns">
  <button class="round-btn" onclick="openSheet('info')"><svg class="ic-svg" viewBox="0 0 24 24" style="width:20px;height:20px"><circle cx="12" cy="12" r="9"/><path d="M12 16v-5M12 8h.01"/></svg></button>
  <button class="round-btn" onclick="zoomIn()"><svg class="ic-svg" viewBox="0 0 24 24" style="width:20px;height:20px"><path d="M12 5v14M5 12h14"/></svg></button>
  <button class="round-btn" onclick="zoomOut()"><svg class="ic-svg" viewBox="0 0 24 24" style="width:20px;height:20px"><path d="M5 12h14"/></svg></button>
  <button class="round-btn" onclick="locateMe()"><svg class="ic-svg" viewBox="0 0 24 24" style="width:21px;height:21px"><circle cx="12" cy="12" r="3.5"/><circle cx="12" cy="12" r="8"/><path d="M12 1v3M12 20v3M1 12h3M20 12h3"/></svg></button>
</div>

<!-- ТАББАР -->
<div class="tabbar">
  <div class="tab active" id="tab-main" onclick="setTab('main')"><div class="ti"><svg class="ic-svg" viewBox="0 0 24 24" style="width:21px;height:21px"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20h14V9.5"/></svg></div>Главная</div>
  <div class="tab" onclick="openSheet('stations');setTab('stations')"><div class="ti"><svg class="ic-svg" viewBox="0 0 24 24" style="width:21px;height:21px"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg></div>Станции</div>
  <div class="tab-center" onclick="openSheet('scan')"><svg class="ic-svg" viewBox="0 0 24 24" style="width:26px;height:26px;stroke-width:2.2"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M3 12h18"/></svg></div>
  <div class="tab" onclick="openSheet('fav');setTab('fav')"><div class="ti"><svg class="ic-svg" viewBox="0 0 24 24" style="width:21px;height:21px"><path d="M12 21s-7-4.6-9.5-9C1 9 2.5 5 6.5 5 9 5 12 8 12 8s3-3 5.5-3c4 0 5.5 4 4 7-2.5 4.4-9.5 9-9.5 9z"/></svg></div>Избранное</div>
  <div class="tab" onclick="openSheet('profile');setTab('profile')"><div class="ti"><svg class="ic-svg" viewBox="0 0 24 24" style="width:21px;height:21px"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.5-6 8-6s8 2 8 6"/></svg></div>Профиль</div>
</div>

<div class="toast" id="toast"></div>

<!-- ПАНЕЛЬ -->
<div class="sheet" id="sheet">
  <div class="grab" onclick="closeSheet()"></div>
  <div class="sheet-head" id="sheetHead"></div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<script>
// ╔════════════════════════════════════════════════════════════╗
// ║  НАСТРОЙКИ КОМПАНИЙ — МЕНЯЙ ТОЛЬКО ЗДЕСЬ                     ║
// ║  logo: путь к картинке (папка logos/ рядом с index.html)    ║
// ║  Если логотипа нет — оставь '' и покажется иконка молнии    ║
// ╚════════════════════════════════════════════════════════════╝
const COMPANIES = {
  EVO:       { name:'EVO Power', color:'#22c55e', logo:'logos/evo.png',       power:120, connector:'CCS2',   price:1500 },
  UzEnergo:  { name:'UzEnergo',  color:'#3b82f6', logo:'logos/uzenergo.png',  power:60,  connector:'Type 2', price:1200 },
  GreenWatt: { name:'GreenWatt', color:'#f59e0b', logo:'logos/greenwatt.png', power:150, connector:'CCS2',   price:1800 },
  PowerUz:   { name:'PowerUZ',   color:'#a855f7', logo:'logos/poweruz.png',   power:90,  connector:'GB/T',   price:1400 },
};
const APP = {
  name:'ChargeUZ',
  version:'1.0',
  tagline:'Все зарядки Узбекистана',
  user:{ name:'Aziz Karimov', phone:'+998 90 123 45 67', avatar:'A' },
  districts:['Yunusabad','Chilanzar','Sergeli','Mirzo Ulugbek','Yakkasaray','Shaykhantakhur','Almazar','Bektemir','Uchtepa','Yashnabad'],
};

// ключи компаний — нужны для генерации станций
const brandKeys = Object.keys(COMPANIES);

// иконка молнии (SVG в base64) — для маркеров без логотипа
const BOLT_ICON = 'data:image/svg+xml;base64,'+btoa('<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" fill="#ffffff"/></svg>');

// ===== ГЕНЕРАЦИЯ СТАНЦИЙ =====
const statuses = ['available','available','available','busy','offline'];
const stations = [];
let idc = 1;
for(let i=0;i<120;i++){
  const key = brandKeys[i % brandKeys.length];
  const c = COMPANIES[key];
  const lat = 41.2311 + Math.random()*0.16, lng = 69.1700 + Math.random()*0.22;
  const total = 2 + Math.floor(Math.random()*6);
  const free = Math.floor(Math.random()*(total+1));
  const district = APP.districts[Math.floor(Math.random()*APP.districts.length)];
  stations.push({
    id:idc++, brand:key, name:`${c.name} — ${district}`,
    lat, lng, power:c.power, connector:c.connector, price:c.price,
    status:statuses[Math.floor(Math.random()*statuses.length)],
    address:`Tashkent, ${district}`, total, free
  });
}

let balance=85975, history=[], favorites=new Set(), userLngLat=null, currentStation=null, chargeInterval=null, applied=false;
let activeFilter='all';
let clusterOn=true; // группировать станции в круги

// маленький логотип для списков/карточек (HTML)
function brandLogoHTML(key,size){
  const c=COMPANIES[key];
  const s=size||42;
  if(c.logo) return `<img src="${c.logo}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.style.background='${c.color}';this.outerHTML='${boltSvg(18)}'">`;
  return boltSvg(18);
}
function boltSvg(sz){
  return `<svg viewBox="0 0 24 24" style="width:${sz}px;height:${sz}px;fill:#fff"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>`;
}

// ===== КАРТА =====
const map=new maplibregl.Map({container:'map',style:'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',center:[69.2797,41.3300],zoom:11.5,attributionControl:false});

function geojson(){
  let arr = stations;
  if(activeFilter!=='all') arr = stations.filter(s=>s.brand===activeFilter);
  return {type:'FeatureCollection',features:arr.map(s=>({
    type:'Feature',
    geometry:{type:'Point',coordinates:[s.lng,s.lat]},
    properties:{id:s.id,brand:s.brand,color:s.status==='offline'?'#9ca3af':COMPANIES[s.brand].color}
  }))};
}

map.on('load', async ()=>{
  // загружаем логотипы как иконки карты
  for(const k of brandKeys){
    const c=COMPANIES[k];
    if(c.logo){
      try{
        const img=await map.loadImage(c.logo);
        if(!map.hasImage('logo-'+k)) map.addImage('logo-'+k, img.data);
      }catch(e){}
    }
  }
  // запасная иконка молнии
  try{ const b=await map.loadImage(BOLT_ICON); if(!map.hasImage('bolt')) map.addImage('bolt', b.data); }catch(e){}

  map.addSource('stations',{type:'geojson',data:geojson(),cluster:true,clusterMaxZoom:14,clusterRadius:55});

  // ── КЛАСТЕРЫ (плавные) ──
  map.addLayer({id:'clusters',type:'circle',source:'stations',filter:['has','point_count'],
    paint:{
      'circle-color':'#ffffff',
      'circle-radius':['interpolate',['linear'],['get','point_count'],2,20,10,26,50,32],
      'circle-stroke-width':3,'circle-stroke-color':'#4338ff',
      'circle-opacity-transition':{duration:400},
      'circle-radius-transition':{duration:400}
    }});
  map.addLayer({id:'cluster-count',type:'symbol',source:'stations',filter:['has','point_count'],
    layout:{'text-field':'{point_count_abbreviated}','text-size':14,'text-font':['Open Sans Bold','Arial Unicode MS Bold'],'text-allow-overlap':true},
    paint:{'text-color':'#4338ff','text-opacity-transition':{duration:400}}});

  // ── ОДИНОЧНЫЕ С ЛОГОТИПОМ ──
  map.addLayer({id:'pt-bg',type:'circle',source:'stations',filter:['!',['has','point_count']],
    paint:{'circle-radius':14,'circle-color':'#fff','circle-stroke-width':3,'circle-stroke-color':['get','color'],
      'circle-opacity-transition':{duration:400},'circle-radius-transition':{duration:400}}});
  map.addLayer({id:'pt-logo',type:'symbol',source:'stations',filter:['!',['has','point_count']],
    layout:{
      'icon-image':['coalesce',['image',['concat','logo-',['get','brand']]],['image','bolt']],
      'icon-size':0.85,
      'icon-allow-overlap':true
    }});

  // юзер
  map.addSource('user',{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  map.addLayer({id:'u-pulse',type:'circle',source:'user',paint:{'circle-radius':22,'circle-color':'#3b82f6','circle-opacity':.18}});
  map.addLayer({id:'u-dot',type:'circle',source:'user',paint:{'circle-radius':8,'circle-color':'#3b82f6','circle-stroke-width':3,'circle-stroke-color':'#fff'}});

  // клики
  map.on('click','clusters',e=>{
    const f=map.queryRenderedFeatures(e.point,{layers:['clusters']});
    map.getSource('stations').getClusterExpansionZoom(f[0].properties.cluster_id,(err,z)=>{
      if(err)return;
      map.easeTo({center:f[0].geometry.coordinates,zoom:z,duration:700,easing:t=>t*(2-t)});
    });
  });
  map.on('click','pt-bg',e=>{const s=stations.find(x=>x.id==e.features[0].properties.id);if(s)openStation(s);});
  ['clusters','pt-bg'].forEach(l=>{map.on('mouseenter',l,()=>map.getCanvas().style.cursor='pointer');map.on('mouseleave',l,()=>map.getCanvas().style.cursor='');});

  buildFilters();
  locateMe(true);
});

// ===== ФИЛЬТР ПО КОМПАНИЯМ =====
function buildFilters(){
  const box=document.getElementById('filters');
  let html=`<button class="chip active" data-f="all" onclick="setFilter('all')"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg>Все</button>`;
  brandKeys.forEach(k=>{
    const c=COMPANIES[k];
    const icon=c.logo?`<img src="${c.logo}" onerror="this.outerHTML='<span class=swatch style=background:${c.color}></span>'">`:`<span class="swatch" style="background:${c.color}"></span>`;
    html+=`<button class="chip" data-f="${k}" onclick="setFilter('${k}')">${icon}${c.name}</button>`;
  });
  box.innerHTML=html;
}
// ===== ВКЛ/ВЫКЛ ГРУППИРОВКУ =====
function toggleCluster(){
  clusterOn=!clusterOn;
  const src=map.getSource('stations');
  if(src){
    src.setClusterOptions ? src.setClusterOptions({cluster:clusterOn}) : 0;
    // надёжный способ — пересоздать источник
  }
  rebuildStations();
  const sw=document.getElementById('clusterSwitch');
  if(sw) sw.classList.toggle('on',clusterOn);
  toast(clusterOn?'Группировка включена':'Группировка выключена');
}
function rebuildStations(){
  if(map.getLayer('clusters'))map.removeLayer('clusters');
  if(map.getLayer('cluster-count'))map.removeLayer('cluster-count');
  if(map.getLayer('pt-bg'))map.removeLayer('pt-bg');
  if(map.getLayer('pt-logo'))map.removeLayer('pt-logo');
  if(map.getSource('stations'))map.removeSource('stations');

  map.addSource('stations',{type:'geojson',data:geojson(),cluster:clusterOn,clusterMaxZoom:14,clusterRadius:55});

  map.addLayer({id:'clusters',type:'circle',source:'stations',filter:['has','point_count'],
    paint:{'circle-color':'#ffffff','circle-radius':['interpolate',['linear'],['get','point_count'],2,20,10,26,50,32],
      'circle-stroke-width':3,'circle-stroke-color':'#4338ff'}});
  map.addLayer({id:'cluster-count',type:'symbol',source:'stations',filter:['has','point_count'],
    layout:{'text-field':'{point_count_abbreviated}','text-size':14,'text-font':['Open Sans Bold','Arial Unicode MS Bold'],'text-allow-overlap':true},
    paint:{'text-color':'#4338ff'}});
  map.addLayer({id:'pt-bg',type:'circle',source:'stations',filter:['!',['has','point_count']],
    paint:{'circle-radius':14,'circle-color':'#fff','circle-stroke-width':3,'circle-stroke-color':['get','color']}});
  map.addLayer({id:'pt-logo',type:'symbol',source:'stations',filter:['!',['has','point_count']],
    layout:{'icon-image':['coalesce',['image',['concat','logo-',['get','brand']]],['image','bolt']],'icon-size':0.85,'icon-allow-overlap':true}});
}
function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.chip').forEach(ch=>ch.classList.toggle('active',ch.dataset.f===f));
  const src=map.getSource('stations'); if(src) src.setData(geojson());
}

function locateMe(silent){
  const setU=ll=>{userLngLat=ll;map.getSource('user').setData({type:'FeatureCollection',features:[{type:'Feature',geometry:{type:'Point',coordinates:ll}}]});map.flyTo({center:ll,zoom:13,duration:900});};
  if(!navigator.geolocation){setU([69.2797,41.3300]);return;}
  navigator.geolocation.getCurrentPosition(p=>setU([p.coords.longitude,p.coords.latitude]),()=>{setU([69.2797,41.3300]);if(!silent)toast('Локация недоступна, показан центр');},{enableHighAccuracy:true,timeout:6000});
}

// ===== СПИСОК СТАНЦИЙ =====
function distKm(s){
  if(!userLngLat) return null;
  const dx=(s.lng-userLngLat[0])*85, dy=(s.lat-userLngLat[1])*111;
  return Math.sqrt(dx*dx+dy*dy);
}
function stationsListSheet(filter=''){
  let arr=[...stations];
  if(filter) arr=arr.filter(s=>s.name.toLowerCase().includes(filter.toLowerCase())||s.address.toLowerCase().includes(filter.toLowerCase()));
  if(userLngLat) arr.sort((a,b)=>distKm(a)-distKm(b));
  const rows=arr.slice(0,60).map(s=>{
    const d=distKm(s);
    return `<div class="list-item" onclick="closeSheet();setTimeout(()=>{flyToStation(${s.id})},250)">
      <div class="li-ic" style="background:${s.status==='offline'?'#9ca3af':COMPANIES[s.brand].color}">${brandLogoHTML(s.brand)}</div>
      <div class="li-main"><div class="li-name">${s.name}</div><div class="li-sub">${statusMap[s.status].txt} · ${s.price} сум/кВт·ч</div></div>
      <div class="li-right">${d?d.toFixed(1)+' км':''}<br><span style="color:#999;font-weight:500">${s.free}/${s.total}</span></div>
    </div>`;
  }).join('');
  setSheet(backBtn('closeSheet()')+`<h2>Станции рядом</h2>`,
    `<input class="search-input" placeholder="Поиск по названию..." oninput="stationsListSheet(this.value)" value="${filter}">${rows||'<div class="empty">Ничего не найдено</div>'}`);
}
function flyToStation(id){
  const s=stations.find(x=>x.id==id);
  if(s){ map.flyTo({center:[s.lng,s.lat],zoom:15,duration:900}); setTimeout(()=>openStation(s),900); }
}

function startCamera(){
  const video=document.getElementById('camVideo');
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ showCamErr(); return; }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(stream=>{ camStream=stream; if(video) video.srcObject=stream; })
    .catch(()=>showCamErr());
}
function showCamErr(){
  const v=document.getElementById('camVideo'), e=document.getElementById('camErr');
  if(v) v.style.display='none';
  if(e) e.style.display='flex';
}
function stopCamera(){
  if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
}

    items.map(x=>`<div class="list-item"><div class="li-ic" style="background:${x.c}">${x.svg}</div><div class="li-main"><div class="li-name">${x.t}</div><div class="li-sub">${x.d}</div></div><div class="li-right" style="color:#999;font-weight:500">${x.time}</div></div>`).join(''));
}

// ===== ИНФО =====
function infoSheet(){
  setSheet(backBtn('closeSheet()')+`<h2>О приложении</h2>`,`
    <div style="text-align:center;padding:14px 0">
      <div style="color:var(--accent)">${boltSvg(50).replace('#fff','#4338ff')}</div>
      <div style="font-size:22px;font-weight:800;margin:8px 0">${APP.name}</div>
      <div style="color:#999;font-size:13px;margin-bottom:20px">Версия ${APP.version} · ${APP.tagline}</div>
    </div>
    <div class="menu-row"><div class="mi">${boltSvg(18).replace('#fff','#444')}</div>Станций на карте<div class="arr" style="color:#111">${stations.length}</div></div>
    <div class="menu-row"><div class="mi"><span style="width:12px;height:12px;border-radius:50%;background:#16a34a;display:block"></span></div>Сейчас свободно<div class="arr" style="color:#111">${stations.filter(s=>s.status==='available').length}</div></div>
    <div class="menu-row" onclick="toast('Звонок в поддержку (демо)')"><div class="mi"><svg class="ic-svg" viewBox="0 0 24 24" style="width:18px"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.6A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c1 .3 1.9.6 2.9.7a2 2 0 0 1 1.7 2z"/></svg></div>Поддержка 24/7<div class="arr">${arrowSvg()}</div></div>
  `);
}

// ===== ЗАРЯДКА =====
function openCharge(){
  if(balance<10000){toast('Недостаточно средств');walletSheet();return;}
  applied=false;
  setSheet(`<button class="back-btn" onclick="stopCharge()"><svg class="ic-svg" viewBox="0 0 24 24" style="width:18px"><path d="M15 18l-6-6 6-6"/></svg></button><h2 id="chgTitle">Идёт зарядка</h2>`,`
    <div style="text-align:center;color:#999;font-size:13px;margin-bottom:6px">${currentStation.name}</div>
    <div class="ring" id="ring"><div class="num2" id="ringNum">0%</div></div>
    <div class="charge-info">
      <div style="text-align:center"><div class="v" id="ckwh">0.0</div><div class="k">кВт·ч</div></div>
      <div style="text-align:center"><div class="v" id="ccost">0</div><div class="k">сум</div></div>
      <div style="text-align:center"><div class="v" id="ctime">0:00</div><div class="k">время</div></div>
    </div>
    <button class="btn" id="stopBtn" onclick="stopCharge()">Остановить зарядку</button>
  `);
  let p=0,kwh=0,sec=0; const price=currentStation.price, pow=currentStation.power;
  clearInterval(chargeInterval);
  chargeInterval=setInterval(()=>{
    p+=2; kwh+=pow/3600*3; sec+=3; if(p>=100)p=100;
    const cost=Math.round(kwh*price);
    const r=document.getElementById('ring'); if(!r){clearInterval(chargeInterval);return;}
    r.style.setProperty('--p',p+'%');
    document.getElementById('ringNum').textContent=p+'%';
    document.getElementById('ckwh').textContent=kwh.toFixed(1);
    document.getElementById('ccost').textContent=cost.toLocaleString('ru');
    const mm=Math.floor(sec/60),ss=sec%60;
    document.getElementById('ctime').textContent=mm+':'+String(ss).padStart(2,'0');
    if(p>=100){clearInterval(chargeInterval);applyCharge();document.getElementById('chgTitle').textContent='Завершено';document.getElementById('stopBtn').textContent='Готово';}
  },400);
}
function applyCharge(){
  if(applied)return; applied=true;
  const cEl=document.getElementById('ccost'); if(!cEl)return;
  const cost=parseInt(cEl.textContent.replace(/\D/g,''))||0;
  if(cost>0){balance-=cost;updateBalance();history.unshift({name:currentStation.name,am:cost,date:new Date().toLocaleString('ru',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})});}
}
function stopCharge(){
  clearInterval(chargeInterval);
  const t=document.getElementById('chgTitle');
  if(t && !t.textContent.includes('Заверш')) applyCharge();
  closeSheet();
}

// ===== TOAST =====
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

updateBalance();
</script>
